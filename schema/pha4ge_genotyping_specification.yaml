id: https://github.com/pha4ge/genotyping-specification/
name: pha4ge_genotyping_specification
title: PHA4GE Microbial Genotyping Contextual Data Specification
description: >-
  A standardized, machine-readable specification for communicating microbial
  genotyping methods and results across laboratories. Developed by the PHA4GE
  Data Structures Working Group.
license: MIT
version: 0.1.0

prefixes:
  linkml: https://w3id.org/linkml/
  OBI: http://purl.obolibrary.org/obo/OBI_
  GENEPIO: http://purl.obolibrary.org/obo/GENEPIO_
  SO: http://purl.obolibrary.org/obo/SO_
  NCBITaxon: http://purl.obolibrary.org/obo/NCBITaxon_

default_range: string

imports:
  - linkml:types

classes:
  GenotypingRecord:
    description: >-
      A record capturing the method, schema, software, and result of a
      microbial genotyping assay for a single organism.
    slots:
      - genotyping_method
      - genotyping_schema_taxon
      - genotyping_database_name
      - genotyping_database_version
      - genotyping_schema_name
      - genotyping_software_name
      - genotyping_software_version
      - genotype
      - genotype_confidence_value
      - genotyping_details

  GenotypingCollection:
    description: A collection of genotyping records.
    tree_root: true
    attributes:
      records:
        range: GenotypingRecord
        multivalued: true
        inlined_as_list: true

slots:
  genotyping_method:
    description: >-
      A method which generates data about a genotype from a specimen of genomic
      DNA. A variety of techniques and instruments can be used to produce
      information about sequence variation at particular genomic positions.
    slot_uri: OBI:0000435
    range: GenotypingMethodMenu
    required: true
    comments:
      - Select the method from the picklist. If the desired method is missing, submit a New Term Request.

  genotyping_schema_taxon:
    description: The taxon that the genotyping schema characterizes.
    slot_uri: GENEPIO:0102163
    range: GenotypingSchemaTaxonMenu
    required: true
    comments:
      - Select the taxon from the picklist. If the desired taxon is missing, submit a New Term Request.

  genotyping_database_name:
    description: >-
      The name of the database containing a set of allelic profiles and
      sequences for genotyping.
    slot_uri: GENEPIO:0102164
    range: string
    comments:
      - Provide the name of the database containing the alleles and allele sequences.

  genotyping_database_version:
    description: >-
      The version of the database containing a set of allelic profiles and
      sequences for genotyping.
    slot_uri: GENEPIO:0102165
    range: string
    comments:
      - >-
        Provide the database version. If a semantic version is unavailable
        (e.g. x.y.z), provide the date of database download (or date of
        database creation if the database is developed in-house).
        Provide dates in ISO 8601 format (YYYY-MM-DD).

  genotyping_schema_name:
    description: >-
      The name of the genotyping schema containing the traits (such as loci
      and alleles) used to determine the genotype.
    slot_uri: GENEPIO:0102166
    range: string
    comments:
      - Include the schema name as provided by the database.

  genotyping_software_name:
    description: The name of the software used to determine the genotype.
    slot_uri: GENEPIO:0102167
    range: GenotypingSoftwareNameMenu
    required: true
    comments:
      - >-
        Select the name of the typing tool from the pick list. If the desired
        tool is not in the list, submit a New Term Request.

  genotyping_software_version:
    description: The version number of the software used to determine the sequence type.
    slot_uri: GENEPIO:0102168
    range: string
    comments:
      - >-
        Provide the software version. If a semantic version is unavailable
        (e.g. x.y.z), provide the date of software release. Provide dates in
        ISO 8601 format (YYYY-MM-DD).

  genotype:
    description: >-
      The set of alleles and variants an individual carries in a particular
      gene or gene locations.
    slot_uri: SO:0001027
    range: string
    comments:
      - >-
        Provide the genotype as it is output from the typing software. Provide
        the most granular type. Add any notes about how to interpret untypable
        results or new sequence types in the "genotyping_details" field.

  genotype_confidence_value:
    description: The measure of confidence provided for a genotype call.
    slot_uri: GENEPIO:0102169
    range: string
    comments:
      - >-
        Some software provides a confidence value for a genotyping result.
        Different confidence scales are used across the community. Provide the
        confidence value as it is output from the tool. Add any notes about
        the confidence value in the "genotyping_details" field.

  genotyping_details:
    description: The details of the genotyping assay.
    slot_uri: GENEPIO:0102170
    range: string
    comments:
      - >-
        Provide any extra information that may be useful for interpreting the
        genotyping results such as citations, and explanations of notations
        denoting new sequence types or untypable results.

enums:
  GenotypingMethodMenu:
    description: Permissible values for the genotyping method field.
    permissible_values:
      target loci based typing:
        description: Genotyping based on specific targeted loci.
      MLST:
        description: Multi-Locus Sequence Typing.
      cgMLST:
        description: Core genome Multi-Locus Sequence Typing.
      wgMLST:
        description: Whole genome Multi-Locus Sequence Typing.
      rMLST:
        description: Ribosomal Multi-Locus Sequence Typing.
      plasmidMLST:
        description: Plasmid Multi-Locus Sequence Typing.
      segment based typing:
        description: Genotyping based on genomic segments.
      whole genome based typing:
        description: Genotyping based on the whole genome.
      SNP typing:
        description: Genotyping based on single nucleotide polymorphisms.
      phylogenetic typing:
        description: Genotyping based on phylogenetic placement.
      LINcode:
        description: Life Identification Number coding for genotyping.
      in silico serotyping:
        description: Computational prediction of serotype from genome sequence.
      In silico species detection:
        description: Computational prediction of species from genome sequence.

  GenotypingSoftwareNameMenu:
    description: Permissible values for the genotyping software name field.
    permissible_values:
      ARIBA:
        description: Antimicrobial Resistance Identification By Assembly (https://github.com/sanger-pathogens/ariba).
      assembly_snptyper:
        description: Assembly-based SNP typing tool (https://github.com/boasvdp/assembly_snptyper).
      BIGSdb:
        description: Bacterial Isolate Genome Sequence database typing software (https://github.com/kjolley/BIGSdb).
      BPagST:
        description: Bordetella pertussis agglutinogen sequence typing tool (https://pubmed.ncbi.nlm.nih.gov/35778384/).
      BTyper3:
        description: Bacillus cereus group in silico virulence and biovar typing tool (https://github.com/lmc297/BTyper3).
      characterize_neisseria_capsule:
        description: Tool for characterizing Neisseria capsule sequences (https://github.com/lmc297/BTyper3).
      chewBBACA:
        description: >-
          A complete suite for gene-by-gene schema creation and strain
          identification using whole-genome MLST (https://github.com/B-UMMI/chewBBACA).
      CoreProfiler:
        description: cgMLST profiling tool (https://gitlab.com/ifb-elixirfr/abromics/coreprofiler).
      emm-typer:
        description: emm gene typing tool for Streptococcus pyogenes (https://github.com/MDU-PHL/emmtyper).
      FastMLST:
        description: Fast multi-locus sequence typing tool (https://github.com/EnzoAndree/FastMLST).
      GBS-SBG:
        description: Group B Streptococcus serotype and sequence-based genotyping tool (https://github.com/swainechen/GBS-SBG).
      hicap:
        description: In silico serotyping of Haemophilus influenzae capsule locus (https://github.com/scwatts/hicap).
      Kleborate:
        description: Klebsiella pneumoniae genotyping and AMR screening tool (https://github.com/klebgenomics/Kleborate).
      legsta:
        description: Legionella pneumophila sequence-based typing tool (https://github.com/tseemann/legsta).
      meningotype:
        description: In silico serotyping of Neisseria meningitidis (https://github.com/MDU-PHL/meningotype).
      MentaLiST:
        description: MLST calling tool using efficient k-mer lookup (https://github.com/WGS-TB/MentaLiST).
      MiST:
        description: Rapid accurate (core-genome) mulit-locus sequence typing (https://github.com/BioinformaticsPlatformWIV-ISP/MiST).
      mlst:
        description: Scan contig files against PubMLST typing schemes (https://github.com/tseemann/mlst).
      mykrobe:
        description: Rapid antibiotic resistance genotyping and species typing tool (https://github.com/Mykrobe-tools/mykrobe).
      PneumoKITy:
        description: Pneumococcal capsular typing tool (https://github.com/CarmenSheppard/PneumoKITy).
      pyMLST:
        description: Python-based MLST tool using whole genome data (https://github.com/bvalot/pyMLST).
      pyngoST:
        description: Neisseria gonorrhoeae sequence typing tool (https://github.com/leosanbu/pyngoST).
      "Ridom SeqSphere+":
        description: Commercial cgMLST and wgMLST analysis software (https://www.ridom.de/seqsphere/).
      SeqSero2:
        description: Salmonella serotyping tool from whole genome sequencing data (https://github.com/denglab/SeqSero2).
      ShigaTyper:
        description: Shigella serotyping tool using whole genome sequencing data (https://github.com/cfsan-biostatistics/shigatyper).
      SISTR:
        description: Salmonella In Silico Typing Resource (https://github.com/phac-nml/sistr_cmd).
      SpoTyping:
        description: Fast and accurate in silico Mycobacterium spoligotyping (https://github.com/xiaeryu/SpoTyping).
      srst2:
        description: Short Read Sequence Typing for bacterial pathogens (https://github.com/katholt/srst2).
      stringMLST:
        description: Ultra-fast k-mer MLST typing tool (https://github.com/jordanlab/stringMLST).
      TBProfiler:
        description: Mycobacterium tuberculosis strain typing and drug resistance prediction tool (https://github.com/jodyphelan/TBProfiler).
      Toxin:
        description: Toxin gene typing tool (?).

